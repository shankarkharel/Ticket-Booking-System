services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: ticket_user
      POSTGRES_PASSWORD: ticket_pass
      POSTGRES_DB: ticket_db
    ports:
      - '55432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      DATABASE_URL: postgresql://ticket_user:ticket_pass@db:5432/ticket_db?schema=public
      PORT: 4000
    ports:
      - '4000:4000'
    depends_on:
      - db
    command: sh -c "npm run db:push && npm run db:seed && npm run start"

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        VITE_API_URL: http://localhost:4000
    ports:
      - '5173:5173'
    depends_on:
      - api

volumes:
  pgdata:
